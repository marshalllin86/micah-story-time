<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Micah's Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>

  /* ============================================================
     怎么编辑这个页面（不用懂代码，改下面 <script> 里这几处就行）：

     1. 加故事：改 STORIES 数组，每行 { title: "标题", file: "audio/xxx.mp3" }
     2. 加音乐：改 MUSIC 数组，格式一样
     3. 颜色不用自己指定，会按 COLORS 列表的顺序自动循环分配
     4. 每页显示几个：改 PAGE_SIZE 这个数字（建议 10~15 之间）
     5. "关于我"里的文字：改 ABOUT 这个对象
     ============================================================ */

  :root{
    --bg: #eef3f2;
    --paper: #FFFFFF;
    --ink: #2B3A36;
    --ink-soft: #5C6B67;
    --sage:   #5C8374;
    --rose:   #C97064;
    --ochre:  #D4A24C;
    --indigo: #3E5C76;
    --teal:   #2E7A80;
    --plum:   #7D5A76;
    --radius: 22px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Sans SC", sans-serif;
    min-height: 100vh;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 32px 16px 80px;
  }

  header{
    text-align:center;
    margin-bottom: 20px;
  }

  h1{
    font-family: "Baloo 2", "Noto Sans SC", sans-serif;
    font-weight:700;
    font-size: clamp(32px, 8vw, 52px);
    margin: 0 0 6px;
    color: var(--ink);
    letter-spacing: 1px;
  }

  header p{
    margin:0;
    color: var(--ink-soft);
    font-size: 16px;
  }

  .tabs{
    display:flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    background: var(--paper);
    padding: 6px;
    border-radius: 999px;
    margin-bottom: 24px;
    box-shadow: 0 2px 0 rgba(43,58,54,0.06);
  }

  .tab{
    border: none;
    background: transparent;
    font-family: "Noto Sans SC", sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink-soft);
    padding: 10px 22px;
    border-radius: 999px;
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }

  .tab.active{
    background: var(--indigo);
    color: #fff;
  }

  .tab:focus-visible{
    outline: 3px solid var(--indigo);
    outline-offset: 2px;
  }

  .panel{ display:none; width:100%; max-width: 640px; }
  .panel.active{ display:block; }

  .shelf{
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .book{
    --accent: var(--sage);
    position: relative;
    display:flex;
    align-items:center;
    gap: 16px;
    background: var(--paper);
    border-radius: var(--radius);
    padding: 14px 18px 14px 14px;
    border: none;
    width:100%;
    text-align:left;
    cursor:pointer;
    box-shadow: 0 2px 0 rgba(43,58,54,0.06);
    transition: transform .18s ease, box-shadow .18s ease;
    font-family: inherit;
  }

  .book.sage{   --accent: var(--sage); }
  .book.rose{   --accent: var(--rose); }
  .book.ochre{  --accent: var(--ochre); }
  .book.indigo{ --accent: var(--indigo); }
  .book.teal{   --accent: var(--teal); }
  .book.plum{   --accent: var(--plum); }

  .book:active{ transform: scale(0.98); }

  .book:focus-visible{
    outline: 3px solid var(--accent);
    outline-offset: 3px;
  }

  .spine{
    flex: 0 0 14px;
    align-self: stretch;
    border-radius: 10px;
    background: var(--accent);
    transition: flex-basis .25s ease;
  }

  .book.playing .spine{ flex-basis: 22px; }

  .play-icon{
    flex: 0 0 auto;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .play-icon svg{ width: 22px; height: 22px; fill: #fff; }

  .info{ flex: 1 1 auto; min-width: 0; }

  .title{
    font-size: 19px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status{
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 2px;
    height: 16px;
  }

  .meta-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
    margin-top: 6px;
  }

  .action-btn{
    display:inline-flex;
    align-items:center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    background: transparent;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  .action-btn:hover{
    text-decoration: underline;
  }

  .progress-track{
    height: 4px;
    background: #E7ECEA;
    border-radius: 4px;
    margin-top: 8px;
    overflow: hidden;
  }

  .progress-fill{
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 4px;
  }

  .book.playing{ box-shadow: 0 4px 14px rgba(43,58,54,0.12); }

  @keyframes pulse{
    0%, 100% { opacity: 1; }
    50% { opacity: .55; }
  }

  .book.playing .play-icon{ animation: pulse 1.6s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce){
    .book, .spine{ transition: none; }
    .book.playing .play-icon{ animation: none; }
  }

  .pager{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 16px;
    margin-top: 20px;
  }

  .pager-btn{
    border: none;
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Sans SC", sans-serif;
    font-size: 15px;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 2px 0 rgba(43,58,54,0.06);
  }

  .pager-btn:disabled{
    opacity: .4;
    cursor: default;
  }

  .pager-info{
    color: var(--ink-soft);
    font-size: 14px;
  }

  .music-subtabs{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .subtab{
    border: none;
    background: var(--paper);
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 2px 0 rgba(43,58,54,0.06);
  }

  .subtab.active{
    background: var(--indigo);
    color: #fff;
  }

  .sports-subtabs{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .sports-subtab{
    border: none;
    background: var(--paper);
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 2px 0 rgba(43,58,54,0.06);
  }

  .sports-subtab.active{
    background: var(--teal);
    color: #fff;
  }

  .learning-card{
    background: var(--paper);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: 0 2px 0 rgba(43,58,54,0.06);
  }

  .learning-form{
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .learning-label{
    font-weight: 600;
    color: var(--ink);
  }

  .learning-title-input,
  .learning-notes-input{
    width: 100%;
    border: 1px solid #dfe7e4;
    border-radius: 14px;
    padding: 12px 14px;
    font: inherit;
    color: var(--ink);
    background: #fafdfc;
  }

  .learning-notes-input{
    min-height: 120px;
    resize: vertical;
  }

  .learning-submit{
    align-self: flex-start;
    border: none;
    background: var(--indigo);
    color: #fff;
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
  }

  .learning-actions{
    display:flex;
    gap: 8px;
    margin-top: 10px;
  }

  .learning-action-btn{
    border: none;
    background: transparent;
    color: var(--indigo);
    cursor: pointer;
    font-size: 13px;
    padding: 0;
  }

  .learning-action-btn.delete{
    color: var(--rose);
  }

  .learning-list{
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .learning-item{
    background: #f7fbfa;
    border: 1px solid #e3ece8;
    border-radius: 16px;
    padding: 14px;
  }

  .learning-item h3{
    margin: 0 0 6px;
    font-size: 18px;
  }

  .learning-item p{
    margin: 0;
    color: var(--ink-soft);
    white-space: pre-line;
    line-height: 1.6;
  }

  .learning-meta{
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .learning-empty{
    color: var(--ink-soft);
    text-align: center;
    padding: 20px 0;
  }

  .about-card{
    background: var(--paper);
    border-radius: var(--radius);
    padding: 32px 26px;
    text-align:center;
    box-shadow: 0 2px 0 rgba(43,58,54,0.06);
  }

  .avatar{
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--indigo);
    color: #fff;
    font-size: 34px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin: 0 auto 14px;
  }

  .about-card h2{
    font-family: "Baloo 2", "Noto Sans SC", sans-serif;
    margin: 0 0 10px;
    font-size: 24px;
  }

  .about-card p{
    color: var(--ink-soft);
    font-size: 15px;
    line-height: 1.7;
    margin: 0;
    white-space: pre-line;
  }

  footer{
    margin-top: 40px;
    color: var(--ink-soft);
    font-size: 13px;
    text-align:center;
  }

  .video-modal{
    position: fixed;
    inset: 0;
    background: rgba(20, 27, 25, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
  }

  .video-modal.open{
    display: flex;
  }

  .video-card{
    width: min(900px, 100%);
    background: var(--paper);
    border-radius: 24px;
    padding: 16px;
    box-shadow: 0 18px 50px rgba(43,58,54,0.24);
  }

  .video-header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .video-close{
    border: none;
    background: transparent;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    color: var(--ink-soft);
  }

  .video-frame{
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 0;
    border-radius: 14px;
    background: #000;
  }

</style>
</head>
<body>

<header>
  <h1>Micah's Inventory</h1>
  <p>Explore stories, reading, music, learning, and sports</p>
</header>

<nav class="tabs" role="tablist">
  <button class="tab active" data-tab="stories">Stories</button>
  <button class="tab" data-tab="reading">Reading</button>
  <button class="tab" data-tab="music">Music</button>
  <button class="tab" data-tab="learning">My Learning</button>
  <button class="tab" data-tab="sports">Sports</button>
</nav>

<section id="panel-stories" class="panel active">
  <div class="shelf" id="shelf-stories"></div>
  <div class="pager" id="pager-stories"></div>
</section>

<section id="panel-reading" class="panel">
  <div class="shelf" id="shelf-reading"></div>
  <div class="pager" id="pager-reading"></div>
</section>

<section id="panel-music" class="panel">
  <div class="music-subtabs" role="tablist" aria-label="Music categories">
    <button class="subtab active" data-subtab="suzuki">Suzuki Piano</button>
    <button class="subtab" data-subtab="ameb">AMEB</button>
    <button class="subtab" data-subtab="collection">My Collection</button>
  </div>
  <div class="shelf" id="shelf-music"></div>
  <div class="pager" id="pager-music"></div>
</section>

<section id="panel-learning" class="panel">
  <div class="learning-card">
    <form id="learning-form" class="learning-form">
      <label class="learning-label" for="learning-title">Title</label>
      <input id="learning-title" class="learning-title-input" type="text" placeholder="What are you learning now?" />

      <label class="learning-label" for="learning-notes">Notes</label>
      <textarea id="learning-notes" class="learning-notes-input" placeholder="Write your notes here..."></textarea>

      <button class="learning-submit" type="submit">Add Learning Session</button>
    </form>

    <div class="learning-list" id="learning-list"></div>
  </div>
</section>

<section id="panel-sports" class="panel">
  <div class="sports-subtabs" role="tablist" aria-label="Sports categories">
    <button class="sports-subtab active" data-sport="swimming">Swimming</button>
    <button class="sports-subtab" data-sport="basketball">Basketball</button>
  </div>
  <div class="about-card" id="sports-card">
    <div class="avatar" id="about-avatar">🏊</div>
    <h2 id="about-name"></h2>
    <p id="about-bio"></p>
  </div>
</section>

<footer id="footer-hint">Tap the circle on the cover to play or pause</footer>

<div class="video-modal" id="video-modal" role="dialog" aria-modal="true" aria-label="YouTube video">
  <div class="video-card">
    <div class="video-header">
      <strong id="video-title">Video</strong>
      <button class="video-close" id="video-close" aria-label="Close video">×</button>
    </div>
    <iframe id="video-frame" class="video-frame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
  </div>
</div>

<audio id="player" preload="none"></audio>

<script>
  const STORIES = [
    { title: "Where do flies go in the Winter?", file: "audio/where_do_flies_go_in_the_winter.m4a" },
    { title: "What Does 'As The Crow Flies' Mean?", file: "audio/what_does_as_the_crow_flies_mean.m4a" },
    { title: "What is Spring Water?", file: "audio/what_is_spring_water.m4a" },
    { title: "Why Do We Sneeze?", file: "audio/why_do_we_sneeze.m4a" },
    { title: "Why Do Pieces of Wood Have Knots?", file: "audio/why_do_pieces_of_wood_have_knots.m4a" },
    { title: "Why Do Snakes Coil Up to Sleep?", file: "audio/why_do_snakes_coil_up_to_sleep.m4a" },
  ];

  const READING = [
    { title: "Reading Goal", description: "A short reading plan for the week.", file: "" },
    { title: "Poetry Practice", description: "A calm collection of poems to enjoy.", file: "" },
  ];

  const MUSIC_CATEGORIES = {
    suzuki: [
      { title: "Level 1 Graduation Piece - Minuet in G Major", file: "audio/level1.webm", link: "https://www.youtube.com/watch?v=M6O6M05hV60" },
      { title: "Level 2 Graduation Piece - Sonatina in G Major", file: "audio/level2.webm", link: "https://www.youtube.com/watch?v=ozd27F2Xn_o" },
      { title: "Level 3 Graduation Piece - Sonatina in C Major", file: "audio/level3.webm", link: "https://www.youtube.com/watch?v=OHuKSd5hWsM" },
      { title: "Level 4 Graduation Piece - Minuet 1, II and Gigue from Partita in Bflat BWV825", file: "audio/level4.webm", link: "https://www.youtube.com/watch?v=nWtlYeWjg1M" },
    ],
    ameb: [
      { title: "Level 3 Graduation Piece - Sonatina in C Major", file: "audio/level3.webm", link: "https://www.youtube.com/watch?v=OHuKSd5hWsM" },
      { title: "Level 4 Graduation Piece - Minuet 1, II and Gigue from Partita in Bflat BWV825", file: "audio/level4.webm", link: "https://www.youtube.com/watch?v=nWtlYeWjg1M" },
    ],
    collection: [
      { title: "My Favourite Practice Pieces", description: "Add your favourite recordings here.", file: "" },
    ],
  };

  const LEARNING_STORAGE_KEY = 'micah-learning-sessions';
  let learningSessions = [];
  let editingSessionId = null;

  const SPORTS = {
    swimming: {
      avatar: "🏊",
      name: "Swimming",
      bio: "Swimming helps build endurance, focus, and confidence.\nAdd your training notes here."
    },
    basketball: {
      avatar: "🏀",
      name: "Basketball",
      bio: "Basketball improves teamwork, coordination, and energy.\nAdd your practice goals here."
    }
  };

  const COLORS = ['sage', 'rose', 'ochre', 'indigo', 'teal', 'plum'];
  const PAGE_SIZE = 12;

  const player = document.getElementById('player');
  const videoModal = document.getElementById('video-modal');
  const videoFrame = document.getElementById('video-frame');
  const videoTitle = document.getElementById('video-title');
  const videoClose = document.getElementById('video-close');
  let currentBook = null;

  const PLAY_SVG  = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  const PAUSE_SVG = '<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

  function buildBook(story){
    const book = document.createElement('button');
    book.className = 'book ' + story.color;
    book.innerHTML = `
      <span class="spine"></span>
      <span class="play-icon">${PLAY_SVG}</span>
      <span class="info">
        <div class="title">${story.title}</div>
        <div class="meta-row">
          <div class="status">${story.description || (story.file ? 'Tap to play' : 'More coming soon')}</div>
          ${story.youtubeId ? `<button type="button" class="action-btn" data-action="video">▶ Watch video</button>` : (story.link ? `<a class="action-btn" href="${story.link}" target="_blank" rel="noopener noreferrer">YouTube ↗</a>` : '')}
        </div>
        <div class="progress-track"><div class="progress-fill"></div></div>
      </span>
    `;
    book.addEventListener('click', () => toggle(book, story));
    const actionBtn = book.querySelector('[data-action="video"]');
    if(actionBtn){
      actionBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        openVideo(story);
      });
    }
    return book;
  }

  function resetBook(book){
    if(!book) return;
    book.classList.remove('playing');
    book.querySelector('.play-icon').innerHTML = PLAY_SVG;
    book.querySelector('.status').textContent = 'Tap to play';
    book.querySelector('.progress-fill').style.width = '0%';
  }

  function openVideo(story){
    if(!story.youtubeId && !story.link) return;
    player.pause();
    if(story.youtubeId){
      videoFrame.src = `https://www.youtube.com/embed/${story.youtubeId}?rel=0`;
      videoTitle.textContent = story.title;
      videoModal.classList.add('open');
    } else if(story.link){
      window.open(story.link, '_blank', 'noopener,noreferrer');
    }
  }

  function toggle(book, story){
    const isSameBook = currentBook === book;

    if(!story.file){
      resetBook(currentBook);
      currentBook = null;
      return;
    }

    if(isSameBook && !player.paused){
      player.pause();
      return;
    }

    if(isSameBook && player.paused && player.currentSrc.endsWith(story.file)){
      player.play();
      return;
    }

    resetBook(currentBook);
    currentBook = book;
    player.src = story.file;
    player.play();
  }

  player.addEventListener('play', () => {
    if(!currentBook) return;
    currentBook.classList.add('playing');
    currentBook.querySelector('.play-icon').innerHTML = PAUSE_SVG;
    currentBook.querySelector('.status').textContent = 'Now playing…';
  });

  player.addEventListener('pause', () => {
    if(!currentBook) return;
    currentBook.classList.remove('playing');
    currentBook.querySelector('.play-icon').innerHTML = PLAY_SVG;
    currentBook.querySelector('.status').textContent = 'Paused. Tap to continue';
  });

  player.addEventListener('ended', () => {
    resetBook(currentBook);
    currentBook = null;
  });

  player.addEventListener('timeupdate', () => {
    if(!currentBook || !player.duration) return;
    const pct = (player.currentTime / player.duration) * 100;
    currentBook.querySelector('.progress-fill').style.width = pct + '%';
  });

  function renderShelf(shelfId, pagerId, data, state){
    const totalPages = Math.max(1, Math.ceil(data.length / PAGE_SIZE));
    state.page = Math.min(Math.max(0, state.page), totalPages - 1);

    const start = state.page * PAGE_SIZE;
    const pageItems = data.slice(start, start + PAGE_SIZE);

    const shelf = document.getElementById(shelfId);
    shelf.innerHTML = '';
    pageItems.forEach((story, i) => {
      const globalIndex = start + i;
      const color = COLORS[globalIndex % COLORS.length];
      shelf.appendChild(buildBook({ ...story, color }));
    });

    renderPager(pagerId, state, totalPages, () => renderShelf(shelfId, pagerId, data, state));
  }

  function renderPager(pagerId, state, totalPages, onChange){
    const pager = document.getElementById(pagerId);
    if(totalPages <= 1){ pager.innerHTML = ''; return; }

    pager.innerHTML = `
      <button class="pager-btn" data-dir="prev" ${state.page === 0 ? 'disabled' : ''}>‹ Previous</button>
      <span class="pager-info">Page ${state.page + 1} of ${totalPages}</span>
      <button class="pager-btn" data-dir="next" ${state.page === totalPages - 1 ? 'disabled' : ''}>Next ›</button>
    `;

    pager.querySelector('[data-dir="prev"]').addEventListener('click', () => {
      state.page--;
      onChange();
    });
    pager.querySelector('[data-dir="next"]').addEventListener('click', () => {
      state.page++;
      onChange();
    });
  }

  function escapeHtml(value){
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function loadLearningSessions(){
    try {
      const stored = localStorage.getItem(LEARNING_STORAGE_KEY);
      if(!stored) return [];
      const parsed = JSON.parse(stored);
      return Array.isArray(parsed) ? parsed : [];
    } catch (error) {
      return [];
    }
  }

  function saveLearningSessions(){
    localStorage.setItem(LEARNING_STORAGE_KEY, JSON.stringify(learningSessions));
  }

  function renderLearningSessions(){
    const container = document.getElementById('learning-list');
    if(!container) return;

    if(learningSessions.length === 0){
      container.innerHTML = '<div class="learning-empty">No learning sessions yet. Add one above.</div>';
      return;
    }

    container.innerHTML = learningSessions.map((session) => `
      <div class="learning-item">
        <h3>${escapeHtml(session.title || 'Learning session')}</h3>
        <p>${escapeHtml(session.notes || '')}</p>
        <div class="learning-meta">${escapeHtml(session.createdAt || '')}</div>
        <div class="learning-actions">
          <button class="learning-action-btn edit" type="button" data-edit-id="${session.id}">Edit</button>
          <button class="learning-action-btn delete" type="button" data-delete-id="${session.id}">Delete</button>
        </div>
      </div>
    `).join('');

    container.querySelectorAll('[data-edit-id]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = Number(btn.getAttribute('data-edit-id'));
        const session = learningSessions.find((item) => item.id === id);
        if(!session) return;

        const titleInput = document.getElementById('learning-title');
        const notesInput = document.getElementById('learning-notes');
        const submitBtn = document.querySelector('#learning-form .learning-submit');
        if(titleInput) titleInput.value = session.title || '';
        if(notesInput) notesInput.value = session.notes || '';
        editingSessionId = id;
        if(submitBtn) submitBtn.textContent = 'Update Learning Session';
        if(titleInput) titleInput.focus();
      });
    });

    container.querySelectorAll('[data-delete-id]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = Number(btn.getAttribute('data-delete-id'));
        learningSessions = learningSessions.filter((item) => item.id !== id);
        saveLearningSessions();
        renderLearningSessions();
      });
    });
  }

  function renderMusicCategory(categoryKey){
    const state = musicState[categoryKey];
    renderShelf('shelf-music', 'pager-music', MUSIC_CATEGORIES[categoryKey] || [], state);
    document.querySelectorAll('.subtab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.subtab === categoryKey);
    });
  }

  function renderSportsCategory(categoryKey){
    const sport = SPORTS[categoryKey] || SPORTS.swimming;
    document.getElementById('about-avatar').textContent = sport.avatar;
    document.getElementById('about-name').textContent = sport.name;
    document.getElementById('about-bio').textContent = sport.bio;
    document.querySelectorAll('.sports-subtab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.sport === categoryKey);
    });
  }

  videoClose.addEventListener('click', () => {
    videoModal.classList.remove('open');
    videoFrame.src = '';
  });

  videoModal.addEventListener('click', (event) => {
    if(event.target === videoModal){
      videoModal.classList.remove('open');
      videoFrame.src = '';
    }
  });

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');

      const hint = document.getElementById('footer-hint');
      hint.textContent = btn.dataset.tab === 'sports'
        ? 'Update this section in index.html if you want to change the sports text.'
        : btn.dataset.tab === 'learning'
          ? 'Add a title and notes for each new learning session.'
          : 'Tap the circle on the cover to play or pause';
    });
  });

  document.querySelectorAll('.subtab').forEach(btn => {
    btn.addEventListener('click', () => {
      renderMusicCategory(btn.dataset.subtab);
    });
  });

  document.querySelectorAll('.sports-subtab').forEach(btn => {
    btn.addEventListener('click', () => {
      renderSportsCategory(btn.dataset.sport);
    });
  });

  const learningForm = document.getElementById('learning-form');
  if(learningForm){
    learningForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const titleInput = document.getElementById('learning-title');
      const notesInput = document.getElementById('learning-notes');
      const title = titleInput ? titleInput.value.trim() : '';
      const notes = notesInput ? notesInput.value.trim() : '';

      if(!title && !notes) return;

      if(editingSessionId){
        learningSessions = learningSessions.map((session) =>
          session.id === editingSessionId
            ? { ...session, title: title || 'Learning session', notes, createdAt: new Date().toLocaleString() }
            : session
        );
      } else {
        learningSessions.unshift({
          id: Date.now(),
          title: title || 'Learning session',
          notes,
          createdAt: new Date().toLocaleString()
        });
      }

      saveLearningSessions();
      renderLearningSessions();

      editingSessionId = null;
      if(titleInput) titleInput.value = '';
      if(notesInput) notesInput.value = '';
      const submitBtn = document.querySelector('#learning-form .learning-submit');
      if(submitBtn) submitBtn.textContent = 'Add Learning Session';
      if(titleInput) titleInput.focus();
    });
  }

  const storiesState = { page: 0 };
  const readingState = { page: 0 };
  const musicState = { suzuki: { page: 0 }, ameb: { page: 0 }, collection: { page: 0 } };
  renderShelf('shelf-stories', 'pager-stories', STORIES, storiesState);
  renderShelf('shelf-reading', 'pager-reading', READING, readingState);
  learningSessions = loadLearningSessions();
  renderLearningSessions();
  renderMusicCategory('suzuki');
  renderSportsCategory('swimming');
</script>

</body>
</html>
